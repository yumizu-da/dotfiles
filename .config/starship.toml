truncation_symbol = ''
disabled = false

[gcloud]
format = 'on [$symbol$account(@$domain)(\($project\))]($style) '
disabled = false

[memory_usage]
symbol = ''
threshold = -1
disabled = false

[python]
disabled = false

[time]
disabled = false
format = '[$time]($style)'
